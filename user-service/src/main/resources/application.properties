server.port=8081

# RDS PostgreSQL (shared). Password from env: SPRING_DATASOURCE_PASSWORD
spring.datasource.url=jdbc:postgresql://teestudio.cx82akg0y5hs.us-west-1.rds.amazonaws.com:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway: run migrations for user-service tables only
spring.flyway.locations=classpath:db/migration
